name: premium_flutter_template
description: "A premium UI flutter template with stunning aesthetics and animations."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI / UX / Aesthetics
  google_fonts: ^6.2.1
  shadcn_ui: ^0.50.2

  # Navigation
  go_router: ^14.8.1

  # State Management (Basic)
  provider: ^6.1.2

  timeago: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
