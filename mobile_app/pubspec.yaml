name: urbanfix
description: A civic issue reporting mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (Backend)
  supabase_flutter: ^2.0.0

  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  shadcn_ui: ^0.40.6

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^12.1.3

  # Local Storage
  shared_preferences: ^2.2.2

  # Image Handling
  image_picker: ^1.0.5

  # Location & Maps
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_maps_flutter: ^2.5.0

  # Utilities
  timeago: ^3.6.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
